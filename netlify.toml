# Netlify deploy config for NEXSTEG (Vite + React static build)
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA / single-page fallback so deep links resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets (Vite fingerprints filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
